<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.15" intercept="0.85"/>
      <feFuncG type="linear" slope="0.12" intercept="0.75"/>
      <feFuncB type="linear" slope="0.08" intercept="0.55"/>
      <feFuncA type="linear" slope="0.3" intercept="0"/>
    </feComponentTransfer>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="100%" height="100%" fill="#3d2317"/>
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.4"/>
</svg>

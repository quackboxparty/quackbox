<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="6" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.1" intercept="0.16"/>
      <feFuncG type="linear" slope="0.08" intercept="0.1"/>
      <feFuncB type="linear" slope="0.05" intercept="0.05"/>
      <feFuncA type="linear" slope="0.2" intercept="0"/>
    </feComponentTransfer>
    <feBlend in="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="100%" height="100%" fill="#2a1a0e"/>
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.5"/>
</svg>

    variants:
      multiple_choice:
        choices:
          - { id: tokyo, text: Tokio }
          - { id: kyoto, text: Kyoto }
          - { id: osaka, text: Osaka }
          - { id: nara, text: Nara }
      open:
        accepted: ['Tokyo', 'Tokio', 'Tokyo, Japan', 'Tokio, Japan']

- id: q_capital_brazil
  content:
    prompt: { text: 'Was ist die Hauptstadt von Brasilien?' }
    answer: Brasília
    explanation: 'Brasília wurde von Grund auf erbaut und ist seit 1960 Hauptstadt, der Platzwechsel von Rio de Janeiro.'
    variants:
      multiple_choice:
        choices:
          - { id: sao_paulo, text: São Paulo }
          - { id: rio, text: Rio de Janeiro }
          - { id: brasilia, text: Brasília }
          - { id: salvador, text: Salvador }
      open:
        accepted: ['Brasilia', 'Brasília']

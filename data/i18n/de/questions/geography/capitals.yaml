- id: q_capital_france
  content:
    prompt: { text: 'Was ist die Hauptstadt von Frankreich?' }
    answer: Paris
    explanation: 'Paris ist seit 987 die Hauptstadt von Frankreich.'
    variants:
      multiple_choice:
        choices:
          - { id: paris, text: Paris }
          - { id: lyon, text: Lyon }
          - { id: marseille, text: Marseille }
          - { id: nice, text: Nizza }
      open:
        accepted: ['Paris', 'Paris, Frankreich']

- id: q_capital_germany

- id: q_capital_brazil
  kind: text
  tags: [subject:geography, subject:capitals, difficulty:niche, region:global]
  content:
    default_lang: en
    prompt: { text: 'What is the capital of Brazil?' }
    answer: Brasilia
    explanation: 'Brasília was built from scratch and became capital in 1960, moving it inland from Rio de Janeiro.'
    variants:
      multiple_choice:
        choices:
          - { id: sao_paulo, text: São Paulo }
          - { id: rio, text: Rio de Janeiro }
          - { id: brasilia, text: Brasília, correct: true }
          - { id: salvador, text: Salvador }
      open:
        accepted: ['Brasilia', 'Brasília', 'Brasilia, Brazil', 'Brasília, Brazil']
        normalize: [lowercase, strip_diacritics]

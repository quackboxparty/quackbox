- id: q_capital_france
  kind: text
  tags: [subject:geography, subject:capitals, difficulty:general, region:global]
  content:
    default_lang: en
    prompt: { text: 'What is the capital of France?' }
    answer: Paris
    explanation: 'Paris has been the capital of France since 987 AD.'
    variants:
      multiple_choice:
        choices:
          - { id: paris, text: Paris, correct: true }
          - { id: lyon, text: Lyon }
          - { id: marseille, text: Marseille }
          - { id: nice, text: Nice }
      open:
        accepted: ['Paris', 'Paris, France']
        normalize: [lowercase]


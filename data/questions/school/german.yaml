  tags: [subject:school, region:global, difficulty:niche]
  content:
    default_lang: de
    prompt: { text: 'Wie viele Knochen hat das Skelett eines erwachsenen Menschen?' }
    answer: '206'
    explanation: 'Ein erwachsener Mensch hat 206 Knochen; Babys kommen mit etwa 270 Knochen auf die Welt, die teilweise zusammenwachsen.'
    variants:
      multiple_choice:
        choices:
          - { id: '186', text: '186' }
          - { id: '206', text: '206', correct: true }
          - { id: '226', text: '226' }
          - { id: '246', text: '246' }
      open:
        accepted: ['206', 'zweihundertsechs']
        normalize: [lowercase, strip_whitespace]
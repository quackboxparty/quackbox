- id: q_2010s_wm_2014
  kind: text
  tags: [subject:2010s, region:global, difficulty:general]
  content:
    default_lang: de
    prompt: { text: 'Welches Land gewann die Fußball-Weltmeisterschaft 2014 in Brasilien?' }
    answer: Deutschland
    explanation: 'Deutschland besiegte im Finale Argentinien 1:0 (Tor: Mario Götze) und wurde in Brasilien Weltmeister.'
    variants:
      multiple_choice:
        choices:
          - { id: deutschland, text: Deutschland, correct: true }
          - { id: brasilien, text: Brasilien }
          - { id: argentinien, text: Argentinien }
          - { id: spanien, text: Spanien }
      open:
        accepted: ['Deutschland', 'DE', 'Bundesrepublik Deutschland']
        normalize: [lowercase, strip_punctuation, strip_articles]


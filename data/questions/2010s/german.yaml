- id: q_2010s_ipad_jahr
  kind: text
  tags: [subject:2010s, region:global, difficulty:easy]
  content:
    default_lang: de
    prompt: { text: 'In welchem Jahr stellte Apple das erste iPad vor?' }
    answer: '2010'
    explanation: 'Apple-Chef Steve Jobs präsentierte das erste iPad am 27. Januar 2010.'
    variants:
      multiple_choice:
        choices:
          - { id: '2007', text: '2007' }
          - { id: '2009', text: '2009' }
          - { id: '2010', text: '2010', correct: true }
          - { id: '2012', text: '2012' }
      open:
        accepted: ['2010']
        normalize: [strip_whitespace]


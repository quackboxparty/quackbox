- id: q_kids_peppa_wutz_medium
  kind: text
  tags: [subject:kids_shows, region:global, difficulty:general]
  content:
    default_lang: de
    prompt: { text: 'Aus welcher britischen Kinderserie stammt die Figur Peppa Wutz (Peppa Pig)?' }
    answer: 'Peppa Pig'
    explanation: '„Peppa Pig" wurde 2004 in Großbritannien erstausgestrahlt; in Deutschland läuft sie als „Peppa Wutz".'
    variants:
      multiple_choice:
        choices:
          - { id: peppa, text: 'Peppa Pig', correct: true }
          - { id: ben_holly, text: 'Ben & Holly' }
          - { id: bob_baumeister, text: 'Bob der Baumeister' }
          - { id: feuwehrmann_sam, text: 'Feuerwehrmann Sam' }
      open:
        accepted: ['Peppa Pig', 'Peppa Wutz']
        normalize: [lowercase, strip_punctuation]


- id: q_kids_sendung_mit_der_maus
  kind: text
  tags: [subject:kids_shows, region:germany, difficulty:easy]
  content:
    default_lang: de
    prompt: { text: 'Welches Tier begleitet die „Sendung mit der Maus" als blauen Freund?' }
    answer: Elefant
    explanation: 'Der blaue Elefant ist seit 1971 das Markenzeichen der „Sendung mit der Maus".'
    variants:
      multiple_choice:
        choices:
          - { id: elefant, text: Elefant, correct: true }
          - { id: loewe, text: Löwe }
          - { id: maus, text: Maus }
          - { id: baer, text: Bär }
      open:
        accepted: ['Elefant', 'der Elefant', 'blaue Elefant']
        normalize: [lowercase, strip_articles, strip_punctuation]

